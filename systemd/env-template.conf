# New instance — copy this file and customize
# Usage: cp env-template.conf env-YOURNAME.conf
# Then: systemctl --user enable nanoclaw@YOURNAME
#        systemctl --user start nanoclaw@YOURNAME

NANOCLAW_WEB_GROUP=CHANGEME
WEB_PORT=3004
CREDENTIAL_PROXY_PORT=3002

# Set your auth token (used by web UI login)
WEB_AUTH_TOKEN=CHANGEME

# Set your Claude API key or OAuth token
# ANTHROPIC_API_KEY=sk-ant-...
# OR
# CLAUDE_CODE_OAUTH_TOKEN=...
